<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum & Chat</title>

    <link rel="stylesheet" href="/static/css/home.css">
    <link rel="stylesheet" href="/static/css/shared.css">
</head>

<body>
    <header>
        <div class="logo"><a onclick="window.location.href = '/'">FORUM.</a></div>

        <div id="auth-btns" class="auth-btns">
            <button class="btn btn-primary" onclick="openLoginPopup()">Log in</button>
            <button class="btn btn-primary" onclick="openRegisterPopup()">Sign up</button>
        </div>

        <div id="unauth-btns" class="hidden">
            <div style="display: inline-flex; gap: 20px; align-items: center;">
                <button class="notifications-trigger" onclick="toggleNotifs(event)">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span class="notifications-counter hidden">0</span>
                </button>

                <div id="notif-menu" class="notif-menu hidden">
                    <div class="menu-header">Notifications</div>
                    <div id="notifications-container" class="notifications-container"></div>
                </div>

                <div class="avatar" style="cursor: pointer;" onclick="toggleLogout(event)">
                    <img src="/static/images/avatar-white.png">
                </div>

                <div id="menu-dropdown" class="menu-dropdown hidden">
                    <div class="profile-header">
                        <img src="/static/images/avatar-white.png" class="avatar">
                        <div>
                            <div id="username" class="usernameMenu"></div>
                            <div id="email" class="emailMenu"></div>
                        </div>
                    </div>

                    <button id="logout" class="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <style>
    </style>

    <div id="unauth-app-shell">
        <div class="brand">FORUM.</div>
        <div class="subtitle">
            <button type="button" class="login-link" onclick="openLoginPopup()">Login to access.</button>
        </div>
    </div>

    <div id="app-shell" class="hidden">
        <div class="container">
            <main class="main-content">

                <div id="feed-view">
                    <div
                        style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">

                        <div style="display: flex; gap: 10px;">
                            <div class="avatar">
                                <img src="/static/images/avatar-white.png">
                            </div>

                            <div class="post-box">
                                <input id="titleCreationArea" type="text" maxlength="120" placeholder="Choose a title for your post..">

                                <textarea id="postCreationArea" maxlength="1000" placeholder="What's on your mind?"></textarea>

                                <div class="category-row">
                                    <button class="cat" data-cat="news">News</button>
                                    <button class="cat" data-cat="tech">Tech</button>
                                    <button class="cat" data-cat="sports">Sport</button>
                                    <button class="cat" data-cat="gaming">Gaming</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="posts-container"></div>
                    <div id="posts-pagination" class="posts-pagination">
                        <button id="posts-prev" class="btn" type="button">Previous</button>
                        <span id="posts-page-indicator">Page 1</span>
                        <button id="posts-next" class="btn" type="button">Next</button>
                    </div>
                </div>

                <div id="post-view" class="post-detail-view hidden">
                    <div id="post-detail-container"></div>
                </div>

            </main>

            <aside class="sidebar" id="right-sidebar">

                <div id="friends-list">
                    <div class="sidebar-header">Contacts</div>
                </div>

                <div id="chat-conversation" class="chat-window hidden">

                    <div class="chat-header">
                        <button class="btn btn-back" onclick="closeChat()">←</button>

                        <div class="avatar">
                            <img src="/static/images/avatar-white.png">
                        </div>

                        <span id="chat-username">User Name</span>
                        <span id="chat-status" class="chat-status offline">Offline</span>
                        <button class="btn btn-back chat-close" onclick="closeChat(); toggleMobileSidebar()">✕</button>
                    </div>

                    <div class="chat-messages" id="chat-messages-container"></div>

                    <div class="chat-input">
                        <input id="messageInput" onkeydown="readMessage(event)" type="text" maxlength="500" placeholder="Message...">
                        <button class="btn btn-primary" onclick="sendMessageFromButton()">Send</button>
                    </div>

                </div>
            </aside>

        </div>

        <button id="mobile-chat-btn" onclick="toggleMobileSidebar()">💬</button>
    </div>

    <div id="login-popup" class="popup hidden">
        <div class="popup-overlay"></div>

        <div class="popup-content">
            <div class="auth-left">
                <h3>Welcome!</h3>
                <div class="side-svg">
                    <svg width="80" height="80" viewBox="0 0 30 16">
                        <path
                            d="m18.4 0-2.803 10.855L12.951 0H9.34L6.693 10.855 3.892 0H0l5.012 15.812h3.425l2.708-10.228 2.709 10.228h3.425L22.29 0h-3.892ZM24.77 13.365c0 1.506 1.12 2.635 2.615 2.635C28.879 16 30 14.87 30 13.365c0-1.506-1.12-2.636-2.615-2.636s-2.615 1.13-2.615 2.636Z">
                        </path>
                    </svg>
                    <svg width="100" height="100" viewBox="0 0 163 163" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M81.09 162.18C125.875 162.18 162.18 125.875 162.18 81.09C162.18 36.3052 125.875 0 81.09 0C36.3053 0 0 36.3052 0 81.09C0 125.875 36.3053 162.18 81.09 162.18Z"
                            fill="#AAEEC4"></path>
                        <path
                            d="M81.0906 147.041C117.514 147.041 147.041 117.514 147.041 81.0906C147.041 44.6674 117.514 15.1406 81.0906 15.1406C44.6675 15.1406 15.1406 44.6674 15.1406 81.0906C15.1406 117.514 44.6675 147.041 81.0906 147.041Z"
                            stroke="#502BD8" stroke-width="8" stroke-miterlimit="1.2"></path>
                        <path
                            d="M103.819 78.3292C108.906 78.3292 113.029 74.1028 113.029 68.8892C113.029 63.6757 108.906 59.4492 103.819 59.4492C98.7329 59.4492 94.6094 63.6757 94.6094 68.8892C94.6094 74.1028 98.7329 78.3292 103.819 78.3292Z"
                            fill="#502BD8"></path>
                        <path
                            d="M58.3662 78.3292C63.4528 78.3292 67.5762 74.1028 67.5762 68.8892C67.5762 63.6757 63.4528 59.4492 58.3662 59.4492C53.2797 59.4492 49.1562 63.6757 49.1562 68.8892C49.1562 74.1028 53.2797 78.3292 58.3662 78.3292Z"
                            fill="#502BD8"></path>
                        <path
                            d="M48.8438 94.8906C52.3937 109.411 65.4838 120.181 81.0938 120.181C96.7037 120.181 109.794 109.411 113.344 94.8906"
                            stroke="#502BD8" stroke-width="8" stroke-miterlimit="1.2"></path>
                    </svg>
                </div>
                <p>Not a member yet? <span onclick="openRegisterPopup()">Register now!</span></p>
            </div>

            <div class="auth-right">
                <h2>Log In</h2>
                <form id="login-form" class="login-form">
                    <input id="login-identifier" type="text" placeholder="Email or Username" required>
                    <input id="login-password" type="password" placeholder="Password" required>
                    <button type="submit" class="btn btn-primary">Log in now</button>
                </form>
            </div>
        </div>
    </div>

    <div id="register-popup" class="popup hidden">
        <div class="popup-overlay" ></div>
        <div class="popup-content">
            <div class="auth-left">
                <h3>Welcome!</h3>
                <div class="side-svg">
                    <svg width="80" height="80" viewBox="0 0 30 16">
                        <path
                            d="m18.4 0-2.803 10.855L12.951 0H9.34L6.693 10.855 3.892 0H0l5.012 15.812h3.425l2.708-10.228 2.709 10.228h3.425L22.29 0h-3.892ZM24.77 13.365c0 1.506 1.12 2.635 2.615 2.635C28.879 16 30 14.87 30 13.365c0-1.506-1.12-2.636-2.615-2.636s-2.615 1.13-2.615 2.636Z">
                        </path>
                    </svg>
                    <svg width="100" height="100" viewBox="0 0 163 163" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M81.09 162.18C125.875 162.18 162.18 125.875 162.18 81.09C162.18 36.3052 125.875 0 81.09 0C36.3052 0 0 36.3052 0 81.09C0 125.875 36.3052 162.18 81.09 162.18Z"
                            fill="#502BD8"></path>
                        <path
                            d="M81.0906 147.041C117.514 147.041 147.041 117.514 147.041 81.0906C147.041 44.6674 117.514 15.1406 81.0906 15.1406C44.6674 15.1406 15.1406 44.6674 15.1406 81.0906C15.1406 117.514 44.6674 147.041 81.0906 147.041Z"
                            stroke="#AAEEC4" stroke-width="8" stroke-miterlimit="1.2"></path>
                        <path
                            d="M103.812 78.3292C108.898 78.3292 113.022 74.1028 113.022 68.8892C113.022 63.6757 108.898 59.4492 103.812 59.4492C98.725 59.4492 94.6016 63.6757 94.6016 68.8892C94.6016 74.1028 98.725 78.3292 103.812 78.3292Z"
                            fill="#AAEEC4"></path>
                        <path
                            d="M58.3584 78.3292C63.445 78.3292 67.5684 74.1028 67.5684 68.8892C67.5684 63.6757 63.445 59.4492 58.3584 59.4492C53.2719 59.4492 49.1484 63.6757 49.1484 68.8892C49.1484 74.1028 53.2719 78.3292 58.3584 78.3292Z"
                            fill="#AAEEC4"></path>
                        <path
                            d="M48.8281 94.8906C52.3781 109.411 65.4681 120.181 81.0781 120.181C96.6881 120.181 109.778 109.411 113.328 94.8906"
                            stroke="#AAEEC4" stroke-width="8" stroke-miterlimit="1.2"></path>
                    </svg>
                </div>
                <p>Are you a member? <span onclick="openLoginPopup()">Log in now!</span></p>
            </div>

            <div class="auth-right">
                <h2>Sign up</h2>
                <form id="register-form" class="login-form">
                    <input id="register-username" type="text" placeholder="Username" required>
                    <input id="register-age" type="number" min="1" max="130" placeholder="Age" required>
                    <select id="register-gender" required>
                        <option value="" disabled selected>Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                    <input id="register-first-name" type="text" placeholder="First Name" required>
                    <input id="register-last-name" type="text" placeholder="Last Name" required>
                    <input id="register-email" type="email" placeholder="Email" required>
                    <input id="register-password" type="password" placeholder="Password" required>
                    <input id="register-confirm-password" type="password" placeholder="Confirm Password" required>
                    <button type="submit" class="btn btn-primary">Sign up now</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="/static/js/ws.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/posts.js"></script>
    <script src="/static/js/comments.js"></script>
    <script src="/static/js/user.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/app.js"></script>

</body>

</html>
